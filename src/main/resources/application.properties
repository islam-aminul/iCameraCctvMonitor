# ============================================================
# iCamera CCTV Monitor – Application Properties
# Organisation: Tata Consultancy Services Ltd.
# URL: https://www.tcsion.com/
# ============================================================

# --- JMX Connection ---
# Host where the iCamera Proxy is running
jmx.host=localhost
# Base port (will try jmx.port, jmx.port+1, ..., jmx.port+jmx.port.retries)
jmx.port=1999
# Number of additional ports to try after base port
jmx.port.retries=5

# --- Polling ---
# How often to poll JMX data (seconds)
poll.interval.seconds=30

# --- ffprobe ---
# Path to ffprobe executable.  Use absolute path or place ffprobe.exe next to the application.
# Example: C:\\iCamera\\ffprobe\\ffprobe.exe
ffprobe.path=.\\ffprobe.exe

# --- Embedded Jetty REST Server ---
jetty.port=8080

# --- Export ---
export.path=${user.home}\\iCameraExports
export.format=XLSX

# --- Theme ---
theme=DARK
accent.color=#2196F3
font.family=Segoe UI
font.size=13
