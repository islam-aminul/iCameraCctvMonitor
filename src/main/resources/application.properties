# ============================================================
# iCamera CCTV Monitor – Application Properties
# Organisation: Tata Consultancy Services Ltd.
# URL: https://www.tcsion.com/
# ============================================================

# --- JMX Connection ---
# Host where the iCamera Proxy is running
jmx.host=localhost
# Base port (will try jmx.port, jmx.port+1, ..., jmx.port+jmx.port.retries)
jmx.port=1099
# Number of additional ports to try after base port
jmx.port.retries=5

# --- Polling ---
# How often to poll JMX data (seconds)
poll.interval.seconds=30

# --- ffprobe ---
# Path to ffprobe executable.  Use absolute path or place ffprobe.exe next to the application.
# Example: C:\\iCamera\\ffprobe\\ffprobe.exe
ffprobe.path=.\\ffprobe.exe

# --- Embedded Jetty REST Server ---
jetty.port=8080

# --- Export ---
# Default resolved at runtime to <app-dir>/exports (see AppDirs)
export.path=exports
export.format=XLSX

# --- Theme ---
theme=DARK
accent.color=#2196F3
font.family=Segoe UI
font.size=13

# --- MAC Validation ---
# Host used for outbound-interface detection and as the HTTPS API base.
mac.validation.host=g01.tcsion.com
# Servlet path appended to https://<mac.validation.host>.
mac.validation.servlet.path=/iCAMERAStreamingFW/GetProxyMacValidationDataServlet
