# =============================================================================
# iCamera CCTV Monitor – MAC Validation Configuration
# =============================================================================
#
# This file is bundled inside the application JAR as a reference template.
#
# To customise the endpoint, place a file named "mac-validation.properties"
# in the same directory as the application JAR / EXE.  The external file takes
# precedence and a template copy is automatically created there on first startup
# if the file does not already exist.
#
# =============================================================================

# mac.validation.host
#   Hostname used for:
#     1. Detecting the local outbound network interface
#        (a no-op UDP probe is made to this host – no data is transmitted)
#     2. Building the HTTPS API URL:
#        https://<mac.validation.host><mac.validation.servlet.path>
mac.validation.host=g01.tcsion.com

# mac.validation.servlet.path
#   Servlet path appended to https://<mac.validation.host>.
mac.validation.servlet.path=/iCAMERAStreamingFW/GetProxyMacValidationDataServlet
